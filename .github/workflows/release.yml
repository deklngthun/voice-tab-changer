name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Download Vosk model
        run: |
          python -c "
          import sys; sys.path.insert(0, 'voice_tab_changer')
          import downloader, os
          downloader.ensure_model('~/.voicetabchanger/models/vosk-model-small-en-us-0.15')
          "

      - name: Build .app with PyInstaller
        run: |
          MODEL="$HOME/.voicetabchanger/models/vosk-model-small-en-us-0.15"
          pyinstaller \
            --name VoiceTabChanger \
            --windowed \
            --onedir \
            --add-data "$MODEL:models/vosk-model-small-en-us-0.15" \
            voice_tab_changer/main.py

      - name: Ad-hoc sign and remove quarantine
        run: |
          codesign --deep --force --sign - dist/VoiceTabChanger.app
          xattr -cr dist/VoiceTabChanger.app

      - name: Create install script
        run: |
          mkdir -p /tmp/vtc_dmg
          cp -R dist/VoiceTabChanger.app /tmp/vtc_dmg/
          cat > "/tmp/vtc_dmg/Install Voice Tab Changer.command" << 'SCRIPT'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          DEST="/Applications/VoiceTabChanger.app"
          [ -d "$DEST" ] && rm -rf "$DEST"
          cp -R "$SCRIPT_DIR/VoiceTabChanger.app" "$DEST"
          xattr -cr "$DEST"
          open "$DEST"
          osascript -e 'display dialog "Voice Tab Changer is installed!\n\nLook for the V icon in your menu bar." buttons {"Got it!"} default button "Got it!" with icon note with title "Voice Tab Changer"'
          SCRIPT
          chmod +x "/tmp/vtc_dmg/Install Voice Tab Changer.command"
          xattr -cr "/tmp/vtc_dmg/Install Voice Tab Changer.command"

      - name: Build DMG
        run: |
          hdiutil create \
            -volname "Voice Tab Changer" \
            -srcfolder /tmp/vtc_dmg \
            -ov -fs HFS+ -format UDZO \
            dist/VoiceTabChanger-macOS.dmg

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VoiceTabChanger-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Download Vosk model
        run: |
          python -c "
          import sys; sys.path.insert(0, 'voice_tab_changer')
          import downloader
          downloader.ensure_model('~/.voicetabchanger/models/vosk-model-small-en-us-0.15')
          "

      - name: Build .exe with PyInstaller
        shell: cmd
        run: |
          set MODEL=%USERPROFILE%\.voicetabchanger\models\vosk-model-small-en-us-0.15
          pyinstaller ^
            --name VoiceTabChanger ^
            --windowed ^
            --onefile ^
            --add-data "%MODEL%;models\vosk-model-small-en-us-0.15" ^
            voice_tab_changer\main.py

      - name: Zip the .exe
        run: Compress-Archive -Path dist\VoiceTabChanger.exe -DestinationPath dist\VoiceTabChanger-Windows.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist\VoiceTabChanger-Windows.zip
